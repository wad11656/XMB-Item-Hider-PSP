# XMB Item Hider ini file

# ===== XMB global flags =====
# 0 = OFF/SHOW | 1 = ON/HIDE ITEMS IN CATEGORY | 2 = HIDE ENTIRE CATEGORY

# "Extras" and "Settings" can't be fully hidden with "2"-they fall back to "1". Hide "Extras" by
# setting one of these VSH regions in CFW settings: Latin America|Hong Kong|Taiwan|Russia|China|Debug I

[Global]
USE_PLUGIN = 1
MOVE_ARK_EXTRAS = 0
START_AT_MEMORY_STICK = 0
HIDE_ALL = 0
HIDE_ALL_SETTINGS = 0
HIDE_ALL_EXTRAS = 0
HIDE_ALL_PHOTO = 0
HIDE_ALL_MUSIC = 0
HIDE_ALL_VIDEO = 0
HIDE_ALL_GAME = 0
HIDE_ALL_NETWORK = 0
HIDE_ALL_PSN = 0

